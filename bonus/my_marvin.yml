jenkins:
  systemMessage: "Welcome to the Chocolatine-Powered Marvin Jenkins Instance."

  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Marvin master"
            permissions:
              - "Overall/Administer"
            entries:
              - user: "chocolateen"
          - name: "ape"
            description: "Pedagogical team member"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Read"
              - "Job/Workspace"
            entries:
              - user: "i_dont_know"
          - name: "gorilla"
            description: "Group Obsessively Researching Innovation Linked to Learning and Accomplishment"
            permissions:
              - "Overall/Read"
              - "Job/Build"
              - "Job/Read"
              - "Job/Workspace"
              - "Job/Create"
              - "Job/Configure"
              - "Job/Delete"
              - "Job/Move"
              - "Job/Cancel"
            entries:
              - user: "vaugie_g"
          - name: "assist"
            description: "Assistant"
            permissions:
              - "Overall/Read"
              - "Job/Read"
              - "Job/Workspace"
            entries:
              - user: "nasso"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "chocolateen"
          name: "Hugo"
          password: ${USER_CHOCOLATEEN_PASSWORD}
        - id: "vaugie_g"
          name: "Garance"
          password: ${USER_VAUGIE_G_PASSWORD}
        - id: "i_dont_know"
          name: "Jeremy"
          password: ${USER_I_DONT_KNOW_PASSWORD}
        - id: "nasso"
          name: "Nassim"
          password: ${USER_NASSO_PASSWORD}

jobs:
  # Only modify this variable locally
  - file: /var/jenkins_home/job_dsl.groovy

appearance:
  themeManager:
    theme: "solarizedDark"

security:
  scriptApproval:
    approvedScriptHashes:
      - "SHA512:6bd73a726aeef2b6834afc464c01ab67f528b5b1f14593059b248b28db43f34798e01f9ae089892ed89c3cdce3418ca2f7763091ca753e6addbcfe5f1ecce3c7"
      - "SHA512:cdd31b24cdc9336f79b3e9afba47b66a634470ac475b42f929eb57d4f6401df5347bfee098c38c2d768949fbd0f001ce53ef4f8ea38db456429240e5d9bdc84a"
